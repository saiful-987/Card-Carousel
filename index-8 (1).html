<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Card-carousel - copyright by @ilmah</title>
    <style>
        body{
            background: #ced7ea;
            height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            margin: 0;
        }
        .deck{
            position: relative;
            cursor: pointer;
            height: 220px;
            width: 150px;
        }

        .card{
            position: absolute;
            width: 100%;
            height: 100%;
            background: #030508;
            color: #ced7ea;
            border-radius: 20px;
            border: 2px solid rgba(255, 255, 255, 0.1);
            display: flex;
            align-items: center;
            justify-content: center;
            font-weight: bold;
            font: sans-serif;
            box-shadow:  0 10px 30px rgba(0, 0, 0, 0.3);
            transition: all 0.6s cubic-bezier(0.75, -0.5, 0.27, 1.55);
            transform-origin: bottom center;
        } 

        .deck:hover .c1{
            transform: rotate(-30deg) translate(-100px, -20px);
        }
        .deck:hover .c2{
            transform: rotate(-15deg) translate(-50px, -10px);
        }
        
        .deck:hover .c3{
            transform: rotate(0deg) translate(0px, -30px);
        }
        
        .deck:hover .c4{
            transform: rotate(15deg) translate(50px, -10px);
        }
        
        .deck:hover .c5{
            transform: rotate(30deg) translate(100px, -20px);
        }

        .card:hover{
            background: #12151a !important;
            color: white !important;
            z-index: 10 !important;
        }

    </style>
</head>
<body>
    <div class="deck">
        <div class=" card c1" style="z-index: 1;">Project A</div>
        <div class=" card c2" style="z-index: 2;">Project B</div>
        <div class=" card c3" style="z-index: 3;">Project C</div>
        <div class=" card c4" style="z-index: 2;">Project D</div>
        <div class=" card c5" style="z-index: 1;">Project E</div>
    </div>
</body>
</html>
